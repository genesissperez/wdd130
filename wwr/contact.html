<!DOCTYPE html>
<html lang="en-US">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - Rush River Co</title>
    <meta name="description" content="Contact Rush River.Co for your next rafting adventure. Find our location in Barinas, Venezuela, or send us a message for reservations and inquiries.">
    <meta name="author" content="Genesis Perez">
    <link rel="stylesheet" href="styles/rafting.css">

</head>


<body>
    <header>
        <div class="logo">            
            <img src="images/logo.png" alt="Rush River Co. Logo" width="100">          
        </div>

        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About Us</a></li>
                <li><a href="trips.html">Trips</a></li>
                <li><a href="contact.html">Contact Us</a></li>
            </ul>
        </nav>        
    </header>

    <main>
        <section class="contact-information">
            <h1>Rush River Rafting Company</h1>
            <address>
                Predio Aguas Bravas, El tigre<br>
                Barinas,Venezuela<br>
                +58 0424 354 0999<br>
                info@rushriver.com
            </address>
        </section>

        <section class="contact">
            <div class="map">
                <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d2018230.7029825088!2d-72.10148703214999!3d8.892899147704343!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x8e64bee8f8a2549b%3A0x709b1670f73c9642!2sAguas%20Bravas%20Rafting!5e0!3m2!1ses!2sve!4v1775434687733!5m2!1ses!2sve" width="100%" height="450" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade">
                </iframe>

            </div>

                <form>
                    <div class="form-item">
                        <label for="user">Name </label>
                        <input type ="text" id="user" name = "user_name" placeholder="Full Name." required>
                    </div>

                    <div class="form-item">
                        <label for="email">Email </label>
                        <input type ="email" id="email" name = "user_email" placeholder="email@example.com" required>
                    </div>

                    <fieldset>
                        <legend>Message Purpose</legend>
                        <label><input type="radio" name="purpose" value="general"> General Inquiry</label>
                        <label><input type="radio" name="purpose" value="reservation"> Reservation Question</label>
                        <label><input type="radio" name="purpose" value="suggestion"> Website Suggestion</label>
                    </fieldset>

                    <div class="form-item">
                        <label for="message">Message</label>
                        <textarea id ="message" name="user_message" rows="3" placeholder="Type here..."> </textarea>
                    </div>

                    <div class="form-checkbox">
                        <label><input type="checkbox" name="subscribe"> Please Subscribe me to the monthly newsletter</label>
                    </div>                    

                    <button type="submit"> Get in Touch! </button>

                </form>             
        </section>   
            


        <section class="employee-section">
            <h2>We Are Here to serve You</h2>

            <div class="adventure-gallery">
                <figure>
                    <img src="images/employee1.png" alt="Photo of the CEO- Jhon Martinez">
                    <figcaption>CEO - John Martinez</figcaption>
                </figure>

                <figure>
                    <img src="images/employee2.png" alt="Photo of the Manager- Juliana Herrera">
                    <figcaption>Manager - Juliana Herrera</figcaption>
                </figure>

                <figure>
                    <img src="images/employee3.png" alt="Photo of the rafting guide- Michael Zanabria">
                    <figcaption>Guide - Michael Zanabria</figcaption>
                </figure>

            </div>            
        </section>
    </main>

    <footer>
        <p><br>©2026 🔹 Rush River.Co 🔹 Génesis Pérez 🔹</p>

        <nav class="socialmedia">
            <a href="https://www.facebook.com">
                <img src="images/facebook.png" alt="Facebook Icon" width="30">
            </a>
            <a href="https://www.instagram.com">
                <img src="images/instagram.png" alt="Instagram Icon" width="30">
                
            </a>
            <a href="https://www.linkedin.com">
                <img src="images/linkeding.png" alt="LinkedIn Icon" width="30">                
            </a>
        </nav>
    </footer>
</body>
</html>
