<!DOCTYPE html>
<html lang="en-US">

<head>
    <meta charset="UTF-8">

</head>

<body>
    <main class="box">
        <h1> ✅ Basic HTML and CSS Quiz</h1>
        <form class="box">
            <div class="quiz-item box">
                <label for="q1">1. What does the acronym CSS stand for?</label>
                <input type ="text" id="q1" name = "q1" required>
            </div>

            <div class="quiz-item box">
                <label for="q2">2. How ar ID and class attributes selected in CSS?</label>
                <textarea id = "q2"> </textarea>
            </div>

            <div class="quiz-item box">
                <label for="q3">3. Which of the following is a valid CSS comment?</label>
                <select id="q3" name = "q3">
                    <option value="" Selected disabled> Choose one ... </option>
                    <option value="a">A. </option>
                    <option value="b">B. </option>
                    <option value="c">C.  </option> 
                </select>
            </div>

            <div class="quiz-item box">
                <label for="q4">4. What is the bottom margin given this declaration?</label>
                <code class="box"> margin: 10px 5px 15 px</code>
                <input type ="number" id="q1" name = "q4">
            </div>

            <button type="submit"> Submit Quiz </button>


        </form>
    </main>
</body>
